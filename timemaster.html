<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Time Management Mastery — Sathish Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07111f;overflow:hidden;font-family:'Nunito',sans-serif}

/* SHELL */
.shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:8px}
.player{width:min(960px,100%);display:flex;flex-direction:column;border-radius:14px;overflow:hidden;box-shadow:0 20px 70px rgba(0,0,0,.85);background:#0b1929}

/* TOPBAR */
.topbar{height:40px;background:#060f1c;border-bottom:1px solid #0d2035;display:flex;align-items:center;padding:0 1rem;gap:.6rem;flex-shrink:0}
.brand{font-family:'Fredoka One',cursive;font-size:.95rem;color:#38bdf8;display:flex;align-items:center;gap:.4rem}
.bdot{width:8px;height:8px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f97316);animation:bp 2s ease-in-out infinite}
@keyframes bp{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.brand b{color:#fff}
.brand span{color:#fbbf24}
.ep-tag{flex:1;text-align:center;font-size:.56rem;font-weight:800;color:#ffffff;letter-spacing:.1em}

/* CANVAS */
.canvas{width:100%;aspect-ratio:16/9;position:relative;overflow:hidden;background:#0a1e35;cursor:pointer;flex-shrink:0}

/* SCENE */
.scene{position:absolute;inset:0;opacity:0;transition:opacity .55s ease}
.scene.active{opacity:1}

/* PLAY OVERLAY */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.52);display:flex;align-items:center;justify-content:center;z-index:500}
.overlay.hide{display:none}
.play-circle{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#07111f}

/* CONTROLS BAR */
.controls{background:#060f1c;border-top:1px solid #0d2035;padding:.4rem .9rem .45rem;flex-shrink:0}

/* PROGRESS ROW */
.prog-row{display:flex;align-items:center;gap:.55rem;margin-bottom:.38rem}
.time-txt{font-size:.58rem;font-weight:800;color:#1a3a55;white-space:nowrap;min-width:2.8ch}
.seekbar{flex:1;position:relative;height:14px;cursor:pointer;display:flex;align-items:center}
.seek-track{position:absolute;left:0;right:0;height:4px;background:#0d2035;border-radius:2px;pointer-events:none}
.seek-fill{position:absolute;left:0;height:4px;background:linear-gradient(90deg,#38bdf8,#818cf8);border-radius:2px;pointer-events:none;width:0%}
.seek-thumb{position:absolute;width:12px;height:12px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.5);pointer-events:none;left:0%;margin-left:-6px}
.seekbar input[type=range]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;margin:0;padding:0}

/* BUTTONS ROW */
.btn-row{display:flex;align-items:center;gap:.4rem}
.cbtn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:.9rem;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0}
.cbtn:hover{background:rgba(255,255,255,.1);color:#fff}
.playbtn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#38bdf8,#818cf8);color:#fff;font-size:.95rem;box-shadow:0 2px 10px rgba(56,189,248,.3)}
.playbtn:hover{transform:scale(1.06)}
.vol-wrap{display:flex;align-items:center;gap:.28rem;margin-left:auto;flex-shrink:0}
.vol-ico{font-size:.8rem;color:#1a3a55}
.vol-sl{width:54px;height:3px;accent-color:#38bdf8;cursor:pointer}

/* SCENE PILLS ROW */
.pills-row{display:flex;gap:.28rem;flex-wrap:wrap;margin-top:.1rem}
.spill{font-size:.5rem;font-weight:800;letter-spacing:.04em;padding:.2rem .55rem;border-radius:5px;cursor:pointer;transition:all .18s;color:rgba(255,255,255,.28);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);white-space:nowrap}
.spill.cur{background:#38bdf8;color:#07111f;border-color:#38bdf8;box-shadow:0 2px 8px rgba(56,189,248,.28)}
.spill:hover:not(.cur){color:#fff;background:rgba(255,255,255,.1)}

/* ===== SCENE ANIMATIONS ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeLeft{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.15)}60%{transform:scale(1.08)}80%{transform:scale(.96)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes zoomIn{from{opacity:0;transform:scale(1.18)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes clockHand{from{transform:rotate(var(--s,0deg))}to{transform:rotate(var(--e,360deg))}}
@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(300px) rotate(540deg)}}
@keyframes walkL{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}
@keyframes walkR{0%,100%{transform:rotate(20deg)}50%{transform:rotate(-20deg)}}
@keyframes armL{0%,100%{transform:rotate(16deg)}50%{transform:rotate(-16deg)}}
@keyframes armR{0%,100%{transform:rotate(-16deg)}50%{transform:rotate(16deg)}}
@keyframes bodyBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes talking{0%,100%{height:4px;border-radius:0 0 6px 6px}50%{height:9px;border-radius:50%}}
@keyframes nodding{0%,100%{transform:rotate(0)}40%{transform:rotate(8deg)}75%{transform:rotate(-3deg)}}
@keyframes waving{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(-80deg)}}
@keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.014)}}
@keyframes jump{0%,100%{transform:translateY(0)}40%{transform:translateY(-18px)}60%{transform:translateY(-14px)}}
@keyframes thinking{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
</style>
</head>
<body>

<div class="shell">
<div class="player">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand"><div class="bdot"></div>Sathish <b>Studio</b><span> ●</span></div>
    <div class="ep-tag">TIME MANAGEMENT MASTERY</div>
  </div>

  <!-- CANVAS -->
  <div class="canvas" id="cvs">
    <div id="scHost" style="position:absolute;inset:0"></div>
    <div class="overlay" id="ov"><div class="play-circle" id="playIco">▶</div></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <div class="prog-row">
      <span class="time-txt" id="tCur">0:00</span>
      <div class="seekbar">
        <div class="seek-track"></div>
        <div class="seek-fill" id="sFill"></div>
        <div class="seek-thumb" id="sThumb"></div>
        <input type="range" id="seekInput" min="0" max="1000" value="0">
      </div>
      <span class="time-txt" id="tTot">3:06</span>
    </div>
    <div class="btn-row">
      <button class="cbtn playbtn" id="playBtn">▶</button>
      <button class="cbtn" id="restBtn" title="Restart">↺</button>
      <div class="pills-row" id="pillsRow"></div>
      <div class="vol-wrap">
        <span class="vol-ico">♪</span>
        <input type="range" class="vol-sl" id="volSl" min="0" max="1" step=".05" value=".55">
      </div>
    </div>
  </div>

</div>
</div>

<script>
"use strict";

/* ========================================
   HELPER FUNCTIONS
======================================== */
function el(tag, css, html, cls) {
  const d = document.createElement(tag || 'div');
  if (css) d.style.cssText = css;
  if (cls) d.className = cls;
  if (html !== undefined) d.innerHTML = html;
  return d;
}
function add(parent, child) { parent.appendChild(child); return child; }

/* ========================================
   CHARACTER BUILDER
======================================== */
function char(opts) {
  const o = Object.assign({
    skin:'#FFCBA4', hair:'#2c1810', shirt:'#5ba4e5',
    pants:'#37474f', tie:null, lh:34, bw:48, bh:50,
    face:'smile', fem:false, glasses:false
  }, opts);
  const lw = Math.floor(o.bw / 2) - 1;
  const mouth =
    o.face === 'smile'   ? `style="width:10px;height:4px;border-radius:0 0 6px 6px;border:2px solid #7d4030;border-top:none"` :
    o.face === 'open'    ? `style="width:9px;height:8px;border-radius:50%;border:2px solid #7d4030;background:#c62828"` :
                           `style="width:9px;height:2px;background:#7d4030;border-radius:2px"`;
  const gl = o.glasses ? `<div style="position:absolute;inset:-2px;border:1.5px solid #555;border-radius:3px"></div>` : '';
  return `
    <div class="ch-head" style="width:42px;height:46px;background:${o.skin};border-radius:50%;position:relative;flex-shrink:0;z-index:3">
      <div style="position:absolute;top:-3px;left:-3px;right:-3px;height:${o.fem?21:17}px;background:${o.hair};border-radius:${o.fem?'50% 50% 10% 10%':'50% 50% 20% 20%'};z-index:1"></div>
      <div style="position:absolute;width:8px;height:11px;background:${o.skin};border-radius:50%;top:38%;left:-5px"></div>
      <div style="position:absolute;width:8px;height:11px;background:${o.skin};border-radius:50%;top:38%;right:-5px"></div>
      <div style="position:absolute;inset:5px 4px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;z-index:2">
        <div style="display:flex;gap:6px">
          <div style="width:5px;height:5px;border-radius:50%;background:#1a0a00;position:relative">${gl}<div style="position:absolute;top:1px;right:1px;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.8)"></div></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#1a0a00;position:relative">${gl}<div style="position:absolute;top:1px;right:1px;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,.8)"></div></div>
        </div>
        <div class="ch-mouth" ${mouth}></div>
      </div>
    </div>
    <div style="width:10px;height:7px;background:${o.skin};margin:0 auto;flex-shrink:0"></div>
    <div class="ch-body" style="width:${o.bw}px;height:${o.bh}px;background:${o.shirt};border-radius:7px 7px 2px 2px;position:relative;flex-shrink:0;z-index:2;transform-origin:top center">
      <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:14px;height:9px;clip-path:polygon(0 0,100% 0,65% 100%,35% 100%);background:#fff;z-index:3"></div>
      ${o.tie ? `<div style="position:absolute;top:6px;left:50%;transform:translateX(-50%);width:7px;height:16px;clip-path:polygon(20% 0,80% 0,100% 65%,50% 100%,0 65%);background:${o.tie};z-index:4"></div>` : ''}
      <div class="ch-al" style="position:absolute;top:6px;left:-9px;width:10px;height:${o.bh-7}px;background:${o.shirt};border-radius:5px;transform-origin:top center;transform:rotate(-14deg);z-index:1">
        <div style="position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:${o.skin}"></div>
      </div>
      <div class="ch-ar" style="position:absolute;top:6px;right:-9px;width:10px;height:${o.bh-7}px;background:${o.shirt};border-radius:5px;transform-origin:top center;transform:rotate(14deg);z-index:1">
        <div style="position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:${o.skin}"></div>
      </div>
    </div>
    <div style="display:flex;gap:3px;flex-shrink:0;z-index:2">
      <div class="ch-ll" style="width:${lw}px;height:${o.lh}px;background:${o.pants};border-radius:0 0 4px 4px;transform-origin:top center"></div>
      <div class="ch-rl" style="width:${lw}px;height:${o.lh}px;background:${o.pants};border-radius:0 0 4px 4px;transform-origin:top center"></div>
    </div>
    <div style="display:flex;gap:3px;flex-shrink:0">
      <div style="width:${lw+2}px;height:7px;background:#1a1a2e;border-radius:2px 6px 4px 2px"></div>
      <div style="width:${lw+2}px;height:7px;background:#1a1a2e;border-radius:2px 6px 4px 2px"></div>
    </div>`;
}

function placeChar(host, state, posCSS, charOpts) {
  const wrap = el('div', 'position:absolute;display:flex;flex-direction:column;align-items:center;' + posCSS);
  wrap.innerHTML = char(charOpts || {});
  applyCharState(wrap, state);
  host.appendChild(wrap);
  return wrap;
}

function applyCharState(wrap, state) {
  const head  = wrap.querySelector('.ch-head');
  const body  = wrap.querySelector('.ch-body');
  const al    = wrap.querySelector('.ch-al');
  const ar    = wrap.querySelector('.ch-ar');
  const ll    = wrap.querySelector('.ch-ll');
  const rl    = wrap.querySelector('.ch-rl');
  const mouth = wrap.querySelector('.ch-mouth');

  if (state === 'walk') {
    if (ll) ll.style.animation = 'walkL .48s ease-in-out infinite';
    if (rl) rl.style.animation = 'walkR .48s ease-in-out infinite';
    if (al) al.style.animation = 'armL .48s ease-in-out infinite';
    if (ar) ar.style.animation = 'armR .48s ease-in-out infinite';
    if (body) body.style.animation = 'bodyBob .48s ease-in-out infinite';
  } else if (state === 'talk') {
    if (mouth) mouth.style.animation = 'talking .32s ease-in-out infinite';
    if (body) body.style.animation = 'breathe 2s ease-in-out infinite';
  } else if (state === 'nod') {
    if (head) head.style.animation = 'nodding .9s ease-in-out infinite';
    if (body) body.style.animation = 'breathe 2s ease-in-out infinite';
  } else if (state === 'wave') {
    if (ar) ar.style.animation = 'waving .55s ease-in-out infinite';
    if (body) body.style.animation = 'breathe 2s ease-in-out infinite';
  } else if (state === 'think') {
    if (head) head.style.animation = 'thinking 1.1s ease-in-out infinite';
    if (body) body.style.animation = 'breathe 2s ease-in-out infinite';
  } else if (state === 'breathe') {
    if (body) body.style.animation = 'breathe 2.2s ease-in-out infinite';
  } else if (state === 'jump') {
    wrap.style.animation = 'jump .52s ease-in-out';
  }
}

/* Animated text helper */
function txt(host, text, posCSS, anim, delay, extra) {
  const d = el('div', 'position:absolute;' + posCSS, text);
  d.style.animation = `${anim||'fadeUp'} .5s cubic-bezier(.4,0,.2,1) ${delay||0}ms both`;
  if (extra) Object.assign(d.style, extra);
  host.appendChild(d);
  return d;
}

/* ========================================
   WEB AUDIO MUSIC
======================================== */
let actx = null, masterGain = null, musicOn = false;

function startMusic(vol) {
  if (musicOn) { if (masterGain) masterGain.gain.setTargetAtTime(vol * .18, actx.currentTime, .2); return; }
  try {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.setValueAtTime(0, actx.currentTime);
    masterGain.gain.linearRampToValueAtTime(vol * .18, actx.currentTime + 1.2);
    masterGain.connect(actx.destination);
    musicOn = true;

    const chords = [[261.63,329.63,392],[293.66,369.99,440],[349.23,440,523.25],[392,493.88,587.33]];
    let ci = 0;
    function playChord() {
      if (!musicOn || !actx) return;
      chords[ci % chords.length].forEach((f, i) => {
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = i === 0 ? 'triangle' : 'sine';
        o.frequency.value = f;
        g.gain.setValueAtTime(0, actx.currentTime);
        g.gain.linearRampToValueAtTime(.09 - i * .02, actx.currentTime + .6);
        g.gain.linearRampToValueAtTime(.05 - i * .01, actx.currentTime + 3.5);
        g.gain.linearRampToValueAtTime(0, actx.currentTime + 5.2);
        o.connect(g); g.connect(masterGain);
        o.start(); o.stop(actx.currentTime + 5.5);
      });
      const mel = [523.25,587.33,659.25,698.46,783.99,659.25,587.33,523.25];
      const mo = actx.createOscillator(), mg = actx.createGain();
      mo.type = 'triangle'; mo.frequency.value = mel[ci % mel.length];
      mg.gain.setValueAtTime(0, actx.currentTime);
      mg.gain.linearRampToValueAtTime(.06, actx.currentTime + .25);
      mg.gain.linearRampToValueAtTime(0, actx.currentTime + 4.2);
      mo.connect(mg); mg.connect(masterGain); mo.start(); mo.stop(actx.currentTime + 4.5);
      ci++;
    }
    playChord();
    const chordTimer = setInterval(() => { if (!musicOn) { clearInterval(chordTimer); return; } playChord(); }, 5000);

    let beat = 0;
    const beatTimer = setInterval(() => {
      if (!musicOn) { clearInterval(beatTimer); return; }
      if (beat % 4 === 0 || beat % 4 === 2) {
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(140, actx.currentTime);
        o.frequency.exponentialRampToValueAtTime(38, actx.currentTime + .14);
        g.gain.setValueAtTime(.3, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001, actx.currentTime + .22);
        o.connect(g); g.connect(masterGain); o.start(); o.stop(actx.currentTime + .25);
      }
      beat++;
    }, 500);
  } catch(e) { console.log('Audio:', e.message); }
}

function pauseMusic() { if (actx) actx.suspend(); }
function resumeMusic() { if (actx) actx.resume(); }
function setVol(v) { if (masterGain && actx) masterGain.gain.setTargetAtTime(v * .18, actx.currentTime, .1); }

/* ========================================
   SCENES
======================================== */
const SCENES = [];

/* ── S0: TITLE ── */
SCENES.push({ label:'Intro', dur:9000, build(h) {
  // Night sky BG
  add(h, el('div', 'position:absolute;inset:0;background:linear-gradient(180deg,#0d1b3e 0%,#1a3a6e 50%,#2d5a9e 100%)'));
  // Stars
  for (let i = 0; i < 22; i++) {
    add(h, el('div', `position:absolute;width:${1+i%2}px;height:${1+i%2}px;border-radius:50%;background:#fff;top:${3+i*3.8}%;left:${(i*13+5)%90}%;opacity:.7;animation:pulse ${2+i*.2}s ${i*.1}s ease-in-out infinite`));
  }
  // Ground
  add(h, el('div', 'position:absolute;bottom:0;left:0;right:0;height:26%;background:linear-gradient(180deg,#2e7d32,#1b5e20)'));
  // Road
  add(h, el('div', 'position:absolute;bottom:0;left:0;right:0;height:9%;background:#424242'));
  add(h, el('div', 'position:absolute;bottom:3%;left:22%;right:22%;height:3px;background:#ffd600;border-radius:2px;opacity:.5'));
  // Moon
  const moon = add(h, el('div', 'position:absolute;top:7%;right:10%;width:58px;height:58px;border-radius:50%;background:radial-gradient(circle at 38% 38%,#fff9c4,#ffd600 58%,#f9a825);box-shadow:0 0 38px rgba(255,214,0,.35)'));
  moon.style.animation = 'pulse 3s ease-in-out infinite';
  // Clock
  const clk = add(h, el('div', 'position:absolute;top:11%;left:50%;transform:translateX(-50%);width:80px;height:80px;border-radius:50%;background:#fff;border:5px solid #1a1a2e;box-shadow:0 6px 22px rgba(0,0,0,.3);overflow:hidden;z-index:20'));
  clk.style.animation = 'popIn .55s .3s both';
  const minH = add(clk, el('div', 'position:absolute;width:4px;height:24px;background:#1a1a2e;bottom:50%;left:calc(50% - 2px);border-radius:3px;transform-origin:bottom center'));
  minH.style.cssText += ';--s:0deg;--e:360deg;animation:clockHand 6s linear infinite';
  const secH = add(clk, el('div', 'position:absolute;width:2px;height:16px;background:#e53935;bottom:50%;left:calc(50% - 1px);border-radius:2px;transform-origin:bottom center'));
  secH.style.cssText += ';--s:90deg;--e:450deg;animation:clockHand 60s linear infinite';
  add(clk, el('div', 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;border-radius:50%;background:#1a1a2e;z-index:5'));
  // Titles — stacked, no overlap
  txt(h, '<span style="font-family:\'Fredoka One\',cursive;font-size:2.7rem;color:#fff;text-shadow:3px 4px 0 #0d47a1,5px 6px 0 rgba(0,0,0,.2)">Time Management</span>',
    'top:38%;left:0;right:0;text-align:center', 'fadeUp', 400);
  txt(h, '<span style="font-family:\'Fredoka One\',cursive;font-size:2rem;color:#ffd600;text-shadow:2px 3px 0 #e65100">Mastery</span>',
    'top:58%;left:0;right:0;text-align:center', 'fadeUp', 800);
  // Episode badge removed
  // Walking character
  const cw = add(h, el('div', 'position:absolute;bottom:9%;left:-80px;z-index:20;display:flex;flex-direction:column;align-items:center;transition:left 2s cubic-bezier(.4,0,.2,1)'));
  cw.innerHTML = char({ shirt:'#5ba4e5', tie:'#ffd600', face:'smile' });
  applyCharState(cw, 'walk');
  setTimeout(() => {
    cw.style.left = '28%';
    setTimeout(() => { applyCharState(cw, 'breathe'); }, 2100);
  }, 300);
}});

/* ── S1: THE PROBLEM ── */
SCENES.push({ label:'Problem', dur:11000, build(h) {
  // Office wall + floor
  add(h, el('div', 'position:absolute;inset:0;background:#e8edf2'));
  add(h, el('div', 'position:absolute;top:0;left:0;right:0;height:64%;background:#f5f5f5;border-bottom:5px solid #cfd8dc'));

/* ========================================
   PLAYBACK ENGINE
======================================== */
const TOTAL = SCENES.reduce((a, s) => a + s.dur, 0);
let curSc = -1, elapsed = 0, isPlaying = false, raf = null, lastT = null;

// Build pills
(function() {
  const row = document.getElementById('pillsRow');
  SCENES.forEach((s, i) => {
    const p = document.createElement('div');
    p.className = 'spill'; p.id = 'sp' + i; p.textContent = s.label;
    p.onclick = () => jumpTo(i); row.appendChild(p);
  });
})();

function setPill(i) {
  document.querySelectorAll('.spill').forEach((p, j) => p.className = 'spill' + (j === i ? ' cur' : ''));
}

function activateScene(i) {
  if (i === curSc) return;
  curSc = i;
  const host = document.getElementById('scHost');
  const old = host.querySelector('.scene.active');
  const nw = document.createElement('div');
  nw.className = 'scene';
  SCENES[i].build(nw);
  host.appendChild(nw);
  requestAnimationFrame(() => {
    nw.classList.add('active');
    if (old) { old.classList.remove('active'); setTimeout(() => old.remove(), 650); }
  });
  setPill(i);
}

function syncUI() {
  const pct = elapsed / TOTAL * 100;
  const fill  = document.getElementById('sFill');
  const thumb = document.getElementById('sThumb');
  const sinp  = document.getElementById('seekInput');
  const tCur  = document.getElementById('tCur');
  if (fill)  fill.style.width = pct + '%';
  if (thumb) thumb.style.left = pct + '%';
  if (sinp)  sinp.value = pct * 10;
  if (tCur)  { const e = Math.floor(elapsed/1000); tCur.textContent = Math.floor(e/60) + ':' + (e%60<10?'0':'') + e%60; }
}

function tick(ts) {
  if (!isPlaying) return;
  const dt = ts - (lastT || ts); lastT = ts;
  elapsed = Math.min(elapsed + dt, TOTAL);
  // Find scene
  let acc = 0;
  for (let i = 0; i < SCENES.length; i++) {
    if (elapsed < acc + SCENES[i].dur) { if (i !== curSc) activateScene(i); break; }
    acc += SCENES[i].dur;
  }
  syncUI();
  if (elapsed >= TOTAL) { onEnd(); return; }
  raf = requestAnimationFrame(tick);
}

function onEnd() {
  isPlaying = false;
  if (raf) cancelAnimationFrame(raf);
  pauseMusic();
  document.getElementById('playBtn').textContent = '↺';
  document.getElementById('playIco').textContent = '↺';
  showOverlay(true);
}

function showOverlay(show) {
  const ov = document.getElementById('ov');
  if (show) { ov.style.opacity = '1'; ov.style.pointerEvents = 'auto'; ov.classList.remove('hide'); }
  else      { ov.classList.add('hide'); }
}

function play() {
  if (isPlaying) return;
  if (elapsed >= TOTAL - 50) { restart(); return; }
  if (curSc === -1) activateScene(0);
  isPlaying = true;
  document.getElementById('playBtn').textContent = '⏸';
  document.getElementById('playIco').textContent = '⏸';
  showOverlay(false);
  const vol = parseFloat(document.getElementById('volSl').value);
  startMusic(vol);
  resumeMusic();
  lastT = null;
  raf = requestAnimationFrame(tick);
}

function pause() {
  if (!isPlaying) return;
  isPlaying = false;
  if (raf) cancelAnimationFrame(raf);
  pauseMusic();
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playIco').textContent = '▶';
  showOverlay(true);
  document.getElementById('playIco').textContent = '▶';
}

function togglePlay() {
  isPlaying ? pause() : play();
}

function restart() {
  pause();
  elapsed = 0; curSc = -1;
  document.getElementById('scHost').innerHTML = '';
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playIco').textContent = '▶';
  syncUI();
  setPill(-1);
  activateScene(0);
  setTimeout(play, 80);
}

function jumpTo(i) {
  let acc = 0;
  for (let j = 0; j < i; j++) acc += SCENES[j].dur;
  elapsed = acc + 50;
  const wasPlaying = isPlaying;
  if (isPlaying) { isPlaying = false; if (raf) cancelAnimationFrame(raf); }
  activateScene(i);
  syncUI();
  if (wasPlaying || true) play(); // always start on pill click
}

// Seek input
document.getElementById('seekInput').addEventListener('input', function() {
  elapsed = (this.value / 1000) * TOTAL;
  let acc = 0;
  for (let i = 0; i < SCENES.length; i++) {
    if (elapsed < acc + SCENES[i].dur) { if (i !== curSc) activateScene(i); break; }
    acc += SCENES[i].dur;
  }
  syncUI();
});

// Canvas click
document.getElementById('cvs').addEventListener('click', togglePlay);
// Overlay click (separate from canvas to avoid double-fire)
document.getElementById('ov').addEventListener('click', function(e) {
  e.stopPropagation(); // prevent bubbling to canvas
  togglePlay();
});

// Play/restart button
document.getElementById('playBtn').addEventListener('click', function(e) {
  e.stopPropagation();
  elapsed >= TOTAL - 50 ? restart() : togglePlay();
});
document.getElementById('restBtn').addEventListener('click', function(e) {
  e.stopPropagation(); restart();
});

// Volume
document.getElementById('volSl').addEventListener('input', function() { setVol(parseFloat(this.value)); });

// Total time
(function() { const t = Math.floor(TOTAL/1000); document.getElementById('tTot').textContent = Math.floor(t/60)+':'+(t%60<10?'0':'')+t%60; })();

/* BOOT — show scene 0, wait for user to press play */
activateScene(0);
syncUI();
showOverlay(true);
document.getElementById('playBtn').textContent = '▶';
</script>
